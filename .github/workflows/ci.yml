name: All-Tests

on:
  push:
    branches: [ master, development ]
  pull_request:
    branches: [ development ]

jobs:
  all-tests:
    name: Test Matrix
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Mac rust config
        uses: ciiiii/toml-editor@1.0.0
        with:
          file: "~/.cargo/config"
          key: "target.aarch64-apple-darwin.rustflags"
          value: '["-C", "link-arg=-undefined","-C", "link-arg=dynamic_lookup",]'

      - name: Rust Nightly
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly

      - name: Cargo build
        uses: actions-rs/cargo@v1
        with:
          command: build

      - name: Generate KATs
        shell: bash
        working-directory: ./tests/KATs
        run: |
          chmod +x build_kats.sh
          bash build_kats.sh

      - name: Run test suite
        shell: bash
        working-directory: ./tests
        run: |
          chmod +x run_all_tests.sh
          bash run_all_tests.sh